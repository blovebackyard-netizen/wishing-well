<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Midnight Manifesting | Luxury Phoenix Well</title>

  <style>
    :root {
      --silver: #dfe9ff;
      --mist: rgba(181, 211, 255, 0.08);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Georgia, "Times New Roman", serif;
      background: url("/background.png") center/cover no-repeat;
      color: var(--silver);
    }

    body.scene-bloom #moon-glow,
    body.scene-bloom #light-beam,
    body.scene-bloom #floor-glow,
    body.scene-bloom #side-glow-left,
    body.scene-bloom #side-glow-right {
      filter: blur(18px) brightness(1.2);
      opacity: 1;
    }

    body.scene-bloom #scene::after {
      opacity: 0.16;
    }

    #scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      isolation: isolate;
    }

    #scene::before {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(165, 194, 255, 0.10);
      box-shadow: inset 0 0 40px rgba(120, 160, 255, 0.05);
      pointer-events: none;
      z-index: 100;
    }

    #scene::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 42%, rgba(0, 0, 0, 0.18) 78%, rgba(0, 0, 0, 0.46) 100%);
      pointer-events: none;
      z-index: 99;
      opacity: 1;
      transition: opacity 0.9s ease;
    }

    /* Background atmosphere */
    #moon-glow,
    #light-beam,
    #side-glow-left,
    #side-glow-right,
    #floor-glow {
      opacity: 0.62;
    }

    #moon-glow {
      position: absolute;
      left: 50%;
      top: 2vh;
      transform: translateX(-50%);
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(210, 232, 255, 0.15), rgba(176, 214, 255, 0.04) 58%, transparent 74%);
      filter: blur(14px);
      pointer-events: none;
      z-index: 1;
    }

    #light-beam {
      position: absolute;
      left: 50%;
      top: 7vh;
      transform: translateX(-50%);
      width: 260px;
      height: 58vh;
      background: linear-gradient(
        180deg,
        rgba(205, 230, 255, 0.11),
        rgba(148, 194, 255, 0.06),
        transparent 84%
      );
      clip-path: polygon(44% 0%, 56% 0%, 100% 100%, 0% 100%);
      filter: blur(9px);
      pointer-events: none;
      z-index: 1;
    }

    #side-glow-left,
    #side-glow-right {
      position: absolute;
      top: 18vh;
      width: 220px;
      height: 440px;
      background: radial-gradient(circle, rgba(127, 174, 255, 0.10), transparent 70%);
      filter: blur(34px);
      pointer-events: none;
      z-index: 1;
    }

    #side-glow-left { left: -50px; }
    #side-glow-right { right: -50px; }

    #floor-glow {
      position: absolute;
      left: 50%;
      bottom: 5vh;
      transform: translateX(-50%);
      width: 520px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(110, 158, 255, 0.22), rgba(94, 139, 255, 0.02) 72%);
      filter: blur(28px);
      pointer-events: none;
      z-index: 1;
    }

    .mist {
      position: absolute;
      width: 150vw;
      height: 32vh;
      left: -24vw;
      bottom: 7vh;
      background: radial-gradient(circle, var(--mist), transparent 60%);
      filter: blur(32px);
      animation: drift 15s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 2;
      opacity: 0.88;
    }

    .mist.mist-2 {
      bottom: 18vh;
      height: 18vh;
      opacity: 0.42;
      animation-duration: 20s;
      filter: blur(24px);
    }

    @keyframes drift {
      from { transform: translateX(-2vw); opacity: 0.55; }
      to { transform: translateX(3vw); opacity: 0.9; }
    }

    /* Title */
    #title-wrap {
      position: absolute;
      top: 4.4vh;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      z-index: 10;
      width: min(88vw, 900px);
    }

    #title-main {
      font-size: clamp(28px, 3.2vw, 48px);
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: rgba(232, 240, 255, 0.98);
      text-shadow:
        0 0 12px rgba(149, 188, 255, 0.22),
        0 0 34px rgba(125, 171, 255, 0.08);
    }

    #title-sub {
      margin-top: 8px;
      font: 500 clamp(11px, 1vw, 14px)/1.4 Arial, sans-serif;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(209, 224, 255, 0.74);
    }

    #title-gems {
      margin-top: 12px;
      font-size: 15px;
      letter-spacing: 0.45em;
      color: rgba(179, 239, 255, 0.75);
      text-shadow: 0 0 16px rgba(143, 231, 255, 0.25);
    }

    /* Decorative diamonds */
    .diamond-orbit {
      position: absolute;
      width: 18px;
      height: 18px;
      transform: rotate(45deg);
      border: 1px solid rgba(180, 240, 255, 0.18);
      background: linear-gradient(135deg, rgba(220, 250, 255, 0.18), rgba(122, 216, 255, 0.06));
      box-shadow:
        0 0 15px rgba(122, 216, 255, 0.16),
        inset 0 0 8px rgba(255,255,255,0.08);
      z-index: 3;
      pointer-events: none;
      animation: diamondFloat 8s ease-in-out infinite alternate;
    }

    .diamond-orbit::after {
      content: "";
      position: absolute;
      inset: 3px;
      border: 1px solid rgba(233, 252, 255, 0.20);
    }

    .diamond-left { left: 20%; top: 18%; animation-delay: -1s; }
    .diamond-right { right: 20%; top: 22%; animation-delay: -3s; }
    .diamond-low-left { left: 14%; bottom: 22%; width: 12px; height: 12px; animation-delay: -2s; }
    .diamond-low-right { right: 14%; bottom: 26%; width: 12px; height: 12px; animation-delay: -5s; }

    @keyframes diamondFloat {
      from { transform: rotate(45deg) translateY(-6px); opacity: 0.58; }
      to { transform: rotate(45deg) translateY(8px); opacity: 0.9; }
    }

    /* Well */
    #well-wrap {
      position: absolute;
      left: 50%;
      bottom: 13.5vh;
      transform: translateX(-50%);
      width: 250px;
      height: 90px;
      perspective: 1000px;
      z-index: 12;
    }

    #well-shadow {
      display: none;
    }

    #well-glow {
      display: none;
    }

    #well-frame {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 250px;
      height: 90px;
      transform: translateX(-50%);
      background: transparent;
      box-shadow: none;
      border: none;
      overflow: visible;
    }

    #well-frame::before,
    #well-frame::after {
      display: none;
    }

    #well-frame.flash {
      animation: wellPulse 1.15s ease;
    }

    @keyframes wellPulse {
      0% { filter: brightness(1); }
      50% { filter: brightness(1.22); }
      100% { filter: brightness(1); }
    }

    #well-inner {
      position: absolute;
      left: 50%;
      top: 0;
      width: 210px;
      height: 56px;
      transform: translateX(-50%);
      border-radius: 50%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 45%, rgba(170, 225, 255, 0.38), rgba(74, 140, 255, 0.20) 38%, rgba(8, 18, 44, 0.72) 68%, rgba(3, 6, 17, 0.92) 100%);
      box-shadow:
        inset 0 0 18px rgba(255, 255, 255, 0.10),
        inset 0 -8px 20px rgba(0, 0, 0, 0.30),
        0 0 20px rgba(118, 176, 255, 0.16);
    }

    #coin-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 15;
  pointer-events: none;
}

    #water {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      z-index: 2;
      background:
        radial-gradient(circle at 50% 35%, rgba(235, 250, 255, 0.26), rgba(164, 218, 255, 0.18) 24%, rgba(84, 154, 255, 0.14) 50%, rgba(0, 0, 0, 0) 72%);
      box-shadow:
        0 0 20px rgba(118, 176, 255, 0.20),
        inset 0 0 14px rgba(194, 229, 255, 0.10);
    }

    #water::before {
      content: "";
      position: absolute;
      left: 18%;
      top: 18%;
      width: 64%;
      height: 22%;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.22), rgba(255,255,255,0.02));
      filter: blur(2px);
      opacity: 0.95;
    }

    /* Effects */
    #ripples-layer,
    #particles-layer,
    #blessing-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .ripple {
      position: absolute;
      width: 28px;
      height: 10px;
      transform: translateX(-50%);
      border-radius: 50%;
      border: 2px solid rgba(157, 209, 255, 0.55);
      animation: ripple 2.4s ease-out forwards;
      filter: blur(0.3px);
    }

    @keyframes ripple {
      0% {
        width: 28px;
        height: 10px;
        opacity: 0.82;
      }
      100% {
        width: 230px;
        height: 52px;
        opacity: 0;
      }
    }

    .spark {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(210, 238, 255, 0.86);
      box-shadow: 0 0 14px rgba(196, 227, 255, 0.58);
      animation: floatUp linear forwards;
    }

    .diamond-spark {
      position: absolute;
      width: 11px;
      height: 11px;
      transform: rotate(45deg);
      background: linear-gradient(135deg, rgba(229, 252, 255, 0.88), rgba(122, 216, 255, 0.32));
      box-shadow: 0 0 18px rgba(122, 216, 255, 0.22);
      animation: floatUp linear forwards;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(0.8) rotate(0deg);
        opacity: 0;
      }
      15% { opacity: 1; }
      100% {
        transform: translateY(-160px) scale(1.15) rotate(16deg);
        opacity: 0;
      }
    }

    /* Text */
    #affirmation {
      position: absolute;
      left: 50%;
      bottom: 44vh;
      transform: translateX(-50%);
      width: min(82vw, 860px);
      text-align: center;
      color: #eef4ff;
      font-size: clamp(24px, 2.65vw, 38px);
      line-height: 1.36;
      letter-spacing: 0.03em;
      text-shadow:
        0 0 10px rgba(130, 177, 255, 0.55),
        0 0 34px rgba(0, 0, 0, 0.45),
        0 0 25px rgba(130, 177, 255, 0.16);
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
      z-index: 20;
    }

    #status {
      position: absolute;
      top: 18px;
      right: 18px;
      font: 12px/1.2 Arial, sans-serif;
      color: rgba(225, 236, 255, 0.78);
      background: rgba(8, 12, 24, 0.55);
      border: 1px solid rgba(132, 168, 255, 0.16);
      border-radius: 999px;
      padding: 8px 13px;
      backdrop-filter: blur(8px);
      z-index: 50;
    }

    #energy-wrap {
      position: absolute;
      left: 50%;
      bottom: 5.6vh;
      transform: translateX(-50%);
      width: 320px;
      text-align: center;
      z-index: 22;
      pointer-events: none;
    }

    #energy-label {
      color: rgba(226, 235, 255, 0.84);
      font: 12px/1.2 Arial, sans-serif;
      margin-bottom: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    #energy-bar {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(132,168,255,0.18);
      overflow: hidden;
      box-shadow:
        inset 0 0 10px rgba(0,0,0,0.26),
        0 0 18px rgba(120, 170, 255, 0.05);
    }

    #energy-fill {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background:
        linear-gradient(90deg,
          rgba(90, 145, 255, 0.55),
          rgba(117, 216, 255, 0.82),
          rgba(255, 223, 150, 0.96)
        );
      box-shadow:
        0 0 20px rgba(125, 192, 255, 0.42),
        0 0 34px rgba(255, 195, 112, 0.16);
      transition: width 0.5s ease;
    }

    .blessing-text {
      position: absolute;
      left: 50%;
      bottom: 53vh;
      transform: translateX(-50%);
      color: rgba(255, 234, 191, 0.92);
      font-size: clamp(18px, 2vw, 28px);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow:
        0 0 12px rgba(255, 197, 121, 0.30),
        0 0 26px rgba(255, 116, 90, 0.18);
      opacity: 0;
      animation: blessingRise 2.6s ease forwards;
      z-index: 40;
      pointer-events: none;
      text-align: center;
      width: 90vw;
    }

    @keyframes blessingRise {
      0% { opacity: 0; transform: translateX(-50%) translateY(24px) scale(0.92); }
      18% { opacity: 1; }
      100% { opacity: 0; transform: translateX(-50%) translateY(-26px) scale(1.04); }
    }
    
    #phoenix-image {
  position: absolute;
  left: 50%;
  bottom: 22vh;
  transform: translateX(-50%) scale(0.8);
  width: 320px;
  opacity: 0;
  pointer-events: none;
  z-index: 30;
  transition: opacity 0.5s ease, transform 0.6s ease;
  filter: drop-shadow(0 0 25px rgba(255, 140, 90, 0.35));
}

#phoenix-image.show {
  opacity: 1;
  transform: translateX(-50%) translateY(-40px) scale(1);
}
  </style>
</head>
<body>
  <div id="scene">
    <div id="moon-glow"></div>
    <div id="light-beam"></div>
    <div id="side-glow-left"></div>
    <div id="side-glow-right"></div>
    <div id="floor-glow"></div>
    <div class="mist"></div>
    <div class="mist mist-2"></div>

    <div id="title-wrap">
      <div id="title-main">Midnight Manifesting</div>
      <div id="title-sub">Luxury Phoenix Well • Diamonds • Destiny • Rise</div>
      <div id="title-gems">✦ ◇ ✦ ◇ ✦</div>
    </div>

    <div class="diamond-orbit diamond-left"></div>
    <div class="diamond-orbit diamond-right"></div>
    <div class="diamond-orbit diamond-low-left"></div>
    <div class="diamond-orbit diamond-low-right"></div>

    <div id="phoenix-sigil">
      <svg viewBox="0 0 300 300" aria-hidden="true">
        <defs>
          <linearGradient id="phoenixStroke" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#fff2bf" stop-opacity="0.95"></stop>
            <stop offset="35%" stop-color="#ffbf70" stop-opacity="0.9"></stop>
            <stop offset="70%" stop-color="#ff8e4a" stop-opacity="0.75"></stop>
            <stop offset="100%" stop-color="#ff5b6a" stop-opacity="0.55"></stop>
          </linearGradient>
        </defs>
        <path d="M150 38
                 C170 64, 178 88, 171 110
                 C191 102, 215 110, 227 130
                 C207 128, 189 136, 176 152
                 C192 155, 210 168, 216 188
                 C194 180, 171 186, 154 204
                 C159 180, 151 160, 136 144
                 C122 159, 115 180, 118 204
                 C101 186, 78 180, 56 188
                 C62 168, 80 155, 96 152
                 C83 136, 65 128, 45 130
                 C57 110, 81 102, 101 110
                 C94 88, 102 64, 122 38
                 C131 56, 141 74, 150 98
                 C159 74, 169 56, 178 38"
              fill="none"
              stroke="url(#phoenixStroke)"
              stroke-width="4.4"
              stroke-linecap="round"
              stroke-linejoin="round" />
        <circle cx="150" cy="150" r="76" fill="none" stroke="rgba(175,205,255,0.14)" stroke-width="1.5" />
        <circle cx="150" cy="150" r="92" fill="none" stroke="rgba(255,194,125,0.08)" stroke-width="1.2" />
      </svg>
    </div>

    <img id="phoenix-image" src="phoenix.png" />

    <div id="well-wrap">
      <div id="well-shadow"></div>
      <div id="well-glow"></div>
      <div id="well-frame">
        <div id="well-inner">
          <div id="water"></div>
        </div>
      </div>
    </div>

    <div id="ripples-layer"></div>
    <div id="particles-layer"></div>
    <div id="blessing-layer"></div>
    <canvas id="coin-canvas"></canvas>
    <div id="affirmation"></div>

    <div id="energy-wrap">
      <div id="energy-label">Diamond Energy</div>
      <div id="energy-bar">
        <div id="energy-fill"></div>
      </div>
    </div>

    <div id="status">Waiting for blessings…</div>
  </div>

  <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
  <script>
    const smallAffirmations = [
      "your wish has been received…",
      "the well has heard you…",
      "energy is moving…",
      "your intention has been placed…",
      "the water carries your wish…"
    ];

    const mediumAffirmations = [
      "your intention is gaining strength…",
      "the universe is responding…",
      "momentum is building around your desire…",
      "your energy is growing brighter…",
      "the path is beginning to open…"
    ];

    const phoenixAffirmations = [
      "🔥 the phoenix rises with your intention…",
      "💎 diamond energy has awakened the flame…",
      "🕊 your blessing is rising from the ashes into form…",
      "👑 luxury energy surrounds this manifestation…"
    ];

    const PUSHER_KEY = "a3c72b1712fa1d637b30";
    const PUSHER_CLUSTER = "us2";

    const scene = document.getElementById("scene");
    const wellWrap = document.getElementById("well-wrap");
    const ripplesLayer = document.getElementById("ripples-layer");
    const particlesLayer = document.getElementById("particles-layer");
    const blessingLayer = document.getElementById("blessing-layer");
    const affirmation = document.getElementById("affirmation");
    const status = document.getElementById("status");
    const energyFill = document.getElementById("energy-fill");
    const wellFrame = document.getElementById("well-frame");
    const specialCharacter = document.getElementById("special-character");

    let energy = 0;

    function getWellAnchor() {
      const sceneRect = scene.getBoundingClientRect();
      const wellRect = wellWrap.getBoundingClientRect();

      return {
        centerX: wellRect.left - sceneRect.left + (wellRect.width / 2),
        bottomY: sceneRect.bottom - wellRect.bottom,
        topY: wellRect.top - sceneRect.top
      };
    }

    const canvas = document.getElementById("coin-canvas");
    const ctx = canvas.getContext("2d");
    const coins = [];

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function makeCoin() {
  const rect = canvas.getBoundingClientRect();
  const anchor = getWellAnchor();

  return {
    x: anchor.centerX + (Math.random() * 120 - 60),
    y: -40 - Math.random() * 120,
    targetX: anchor.centerX + (Math.random() * 80 - 40),
    targetY: rect.height - anchor.bottomY + 18,
    r: 7 + Math.random() * 3,
    vy: 3.6 + Math.random() * 2.4,
    vx: (Math.random() - 0.5) * 0.6,
    rotation: Math.random() * Math.PI,
    vr: (Math.random() - 0.5) * 0.08,
    alpha: 1
  };
}

    function spawnCoins(amount = 8) {
      for (let i = 0; i < amount; i++) {
        coins.push(makeCoin());
      }
    }

    function drawCoin(c) {
      ctx.globalAlpha = c.alpha;

      const size = c.r * 2.1;

      const glow = ctx.createRadialGradient(c.x, c.y, 1, c.x, c.y, size * 1.4);
      glow.addColorStop(0, "rgba(230, 250, 255, 0.55)");
      glow.addColorStop(0.45, "rgba(122, 216, 255, 0.25)");
      glow.addColorStop(1, "rgba(122, 216, 255, 0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(c.x, c.y, size * 1.2, 0, Math.PI * 2);
      ctx.fill();

      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.rotate((Math.PI / 4) + c.rotation);

      const grad = ctx.createLinearGradient(-size, -size, size, size);
      grad.addColorStop(0, "#ffffff");
      grad.addColorStop(0.22, "#e6fbff");
      grad.addColorStop(0.52, "#b6efff");
      grad.addColorStop(0.78, "#74d8ff");
      grad.addColorStop(1, "#dff7ff");

      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(0, -size * 0.82);
      ctx.lineTo(size * 0.58, 0);
      ctx.lineTo(0, size * 0.92);
      ctx.lineTo(-size * 0.58, 0);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.45)";
      ctx.beginPath();
      ctx.moveTo(0, -size * 0.46);
      ctx.lineTo(size * 0.24, 0);
      ctx.lineTo(0, size * 0.42);
      ctx.lineTo(-size * 0.24, 0);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    function animateCanvas() {
      const rect = canvas.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);

      for (let i = coins.length - 1; i >= 0; i--) {
  const c = coins[i];

  c.y += c.vy;
  c.x += (c.targetX - c.x) * 0.015 + c.vx;
  c.rotation += c.vr;
  c.r *= 0.994;
  c.alpha *= 0.988;

  drawCoin(c);

  if (c.alpha < 0.05 || c.y > c.targetY || c.r < 1.4) {
    coins.splice(i, 1);
  }
}

      ctx.globalAlpha = 1;
      requestAnimationFrame(animateCanvas);
    }

    function pulseWell() {
      wellFrame.classList.remove("flash");
      void wellFrame.offsetWidth;
      wellFrame.classList.add("flash");
    }

    function pulseScene() {
      document.body.classList.remove("scene-bloom");
      void document.body.offsetWidth;
      document.body.classList.add("scene-bloom");
      setTimeout(() => {
        document.body.classList.remove("scene-bloom");
      }, 1200);
    }

    function triggerPhoenix() {
      const anchor = getWellAnchor();
      specialCharacter.style.left = `${anchor.centerX}px`;
      specialCharacter.style.bottom = `${anchor.bottomY + 70}px`;

      specialCharacter.classList.remove("show");
      void specialCharacter.offsetWidth;
      specialCharacter.classList.add("show");

      setTimeout(() => {
        specialCharacter.classList.remove("show");
      }, 3000);
    }

    function showBlessingText(text) {
      const el = document.createElement("div");
      el.className = "blessing-text";
      el.textContent = text;
      blessingLayer.appendChild(el);
      setTimeout(() => el.remove(), 2600);
    }

    function updateEnergy(amount) {
      energy = Math.min(100, energy + amount);
      energyFill.style.width = energy + "%";

      if (energy >= 100) {
        status.textContent = "Phoenix blessing awakened ✨";
        spawnCoins(26);
        addRipple(5);
        addParticles(42, true);
        pulseScene();
        triggerPhoenix();
        showBlessingText("Phoenix Blessing Activated");

        setTimeout(() => {
          energy = 0;
          energyFill.style.width = "0%";
          status.textContent = "Waiting for blessings…";
        }, 2600);
      }
    }

    function showAffirmation(username = "", customText = "", diamonds = 1) {
      let pool = smallAffirmations;

      if (diamonds >= 100) {
        pool = phoenixAffirmations;
      } else if (diamonds >= 10) {
        pool = mediumAffirmations;
      }

      const line = customText || pool[Math.floor(Math.random() * pool.length)];

      affirmation.textContent =
        username && diamonds < 10
          ? `✨ ${username}, ${line}`
          : `✨ ${line}`;

      affirmation.style.opacity = "1";

      setTimeout(() => {
        affirmation.style.opacity = "0";
      }, 4200);
    }

    function addRipple(count = 1) {
      const anchor = getWellAnchor();

      for (let i = 0; i < count; i++) {
        const ripple = document.createElement("div");
        ripple.className = "ripple";
        ripple.style.left = `${anchor.centerX}px`;
        ripple.style.bottom = `${anchor.bottomY + 28 + i * 2}px`;

        ripplesLayer.appendChild(ripple);
        setTimeout(() => ripple.remove(), 2400);
      }
    }

    function addParticles(power = 12, includeDiamonds = false) {
      const anchor = getWellAnchor();

      for (let i = 0; i < power; i++) {
        const spark = document.createElement("div");
        spark.className = Math.random() < 0.2 && includeDiamonds ? "diamond-spark" : "spark";
        spark.style.left = `${anchor.centerX + (Math.random() * 90 - 45)}px`;
        spark.style.bottom = `${anchor.bottomY + 34 + Math.random() * 26}px`;
        spark.style.animationDuration = `${2.1 + Math.random() * 2.2}s`;

        particlesLayer.appendChild(spark);
        setTimeout(() => spark.remove(), 4300);
      }
    }

    function manifest(amount = 10, username = "", giftName = "", diamonds = 1) {
      let rippleCount = 1;
      let particleCount = 12;
      let energyGain = 8;
      let includeDiamonds = false;
      let custom = giftName ? `${giftName} has entered the well…` : "";

      if (diamonds >= 1000) {
        rippleCount = 6;
        particleCount = 60;
        energyGain = 100;
        includeDiamonds = true;
        custom = "🔥 a phoenix-level manifestation has entered the well…";
        pulseScene();
        triggerPhoenix();
        showBlessingText("Phoenix Ascension");
      } else if (diamonds >= 100) {
        rippleCount = 4;
        particleCount = 34;
        energyGain = 34;
        includeDiamonds = true;
        custom = "💎 a luxury blessing has entered the well…";
        pulseScene();
        triggerPhoenix();
      } else if (diamonds >= 10) {
        rippleCount = 2;
        particleCount = 20;
        energyGain = 16;
        includeDiamonds = true;
        custom = "✨ your intention is gaining strength…";
      }

      spawnCoins(Math.max(14, amount * 2));
      addRipple(rippleCount);
      addParticles(particleCount, includeDiamonds);
      pulseWell();
      updateEnergy(energyGain);
      showAffirmation(username, custom, diamonds);
    }

    const pusher = new Pusher(PUSHER_KEY, {
      cluster: PUSHER_CLUSTER
    });

    const channel = pusher.subscribe("wishing-well");

    channel.bind("gift-received", function(data) {
      const amount = Number(data.amount || 10);
      const username = data.username || "";
      const giftName = data.giftName || "";
      const diamonds = Number(data.diamonds || 1);

      manifest(amount, username, giftName, diamonds);

      status.textContent = "Blessing received ✨";
      setTimeout(() => {
        if (energy < 100) status.textContent = "Waiting for blessings…";
      }, 2500);
    });

    pusher.connection.bind("connected", function() {
      status.textContent = "Connected ✨";
      setTimeout(() => {
        status.textContent = "Waiting for blessings…";
      }, 1800);
    });

    pusher.connection.bind("error", function() {
      status.textContent = "Connection issue";
    });

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
    animateCanvas();
  </script>
</body>
</html>
