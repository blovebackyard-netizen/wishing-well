<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Midnight Manifesting Wishing Well</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 35%, rgba(59, 96, 168, 0.22), transparent 30%),
        radial-gradient(circle at 50% 100%, rgba(28, 50, 91, 0.65), transparent 40%),
        linear-gradient(180deg, #060814 0%, #090d1d 35%, #05070f 100%);
      font-family: Georgia, serif;
    }

    #scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .mist {
      position: absolute;
      width: 140vw;
      height: 30vh;
      left: -20vw;
      bottom: 8vh;
      background: radial-gradient(circle, rgba(182, 209, 255, 0.08), transparent 60%);
      filter: blur(30px);
      animation: drift 14s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes drift {
      from { transform: translateX(-2vw); opacity: 0.55; }
      to { transform: translateX(2vw); opacity: 0.8; }
    }

    #well-wrap {
      position: absolute;
      left: 50%;
      bottom: 13vh;
      transform: translateX(-50%);
      width: 340px;
      height: 220px;
    }

    #well-glow {
      position: absolute;
      left: 50%;
      bottom: 28px;
      width: 240px;
      height: 70px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(105, 161, 255, 0.38), rgba(105, 161, 255, 0.02) 70%);
      filter: blur(12px);
      pointer-events: none;
    }

    #well {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 300px;
      height: 140px;
      transform: translateX(-50%);
      border-radius: 50% / 44%;
      background:
        radial-gradient(circle at 50% 38%, rgba(129, 186, 255, 0.25), rgba(40, 68, 128, 0.10) 45%, rgba(10,15,35,0.0) 65%),
        linear-gradient(180deg, rgba(18, 24, 48, 0.9), rgba(8, 11, 23, 0.98));
      box-shadow:
        0 0 45px rgba(86, 139, 255, 0.22),
        inset 0 0 20px rgba(120, 170, 255, 0.15),
        inset 0 -18px 30px rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(149, 189, 255, 0.18);
      overflow: visible;
    }

    #water {
      position: absolute;
      left: 50%;
      top: 20px;
      width: 225px;
      height: 56px;
      transform: translateX(-50%);
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 45%, rgba(163, 206, 255, 0.26), rgba(76, 126, 219, 0.10) 55%, rgba(0,0,0,0) 70%);
      box-shadow:
        0 0 18px rgba(117, 176, 255, 0.18),
        inset 0 0 14px rgba(178, 220, 255, 0.13);
    }

    #coins-layer, #ripples-layer, #particles-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .coin {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 35%, #fff7bf 0%, #ffe27a 25%, #e0b645 55%, #9c6f13 100%);
      box-shadow:
        0 0 10px rgba(255, 214, 94, 0.4),
        0 0 20px rgba(255, 214, 94, 0.15);
      animation: coinFall 2.8s ease-in forwards;
    }

    @keyframes coinFall {
      0% {
        transform: translateY(0) scale(0.9);
        opacity: 0;
      }
      10% { opacity: 1; }
      100% {
        transform: translateY(430px) scale(1);
        opacity: 0.85;
      }
    }

    .ripple {
      position: absolute;
      left: 50%;
      bottom: 42px;
      width: 26px;
      height: 10px;
      transform: translateX(-50%);
      border-radius: 50%;
      border: 2px solid rgba(157, 209, 255, 0.55);
      animation: ripple 2.4s ease-out forwards;
      filter: blur(0.3px);
    }

    @keyframes ripple {
      0% {
        width: 26px;
        height: 10px;
        opacity: 0.8;
      }
      100% {
        width: 260px;
        height: 58px;
        opacity: 0;
      }
    }

    .spark {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(196, 227, 255, 0.85);
      box-shadow: 0 0 12px rgba(196, 227, 255, 0.55);
      animation: floatUp linear forwards;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(0.8);
        opacity: 0;
      }
      15% { opacity: 1; }
      100% {
        transform: translateY(-140px) scale(1.1);
        opacity: 0;
      }
    }

    #affirmation {
      position: absolute;
      left: 50%;
      bottom: 40vh;
      transform: translateX(-50%);
      width: min(78vw, 900px);
      text-align: center;
      color: #dde8ff;
      font-size: clamp(22px, 2.5vw, 34px);
      line-height: 1.35;
      letter-spacing: 0.02em;
      text-shadow:
        0 0 10px rgba(130, 177, 255, 0.5),
        0 0 25px rgba(130, 177, 255, 0.18);
      opacity: 0;
      transition: opacity 0.9s ease;
      pointer-events: none;
    }

    #status {
      position: absolute;
      top: 18px;
      right: 18px;
      font: 12px/1.2 Arial, sans-serif;
      color: rgba(220, 232, 255, 0.75);
      background: rgba(8, 12, 24, 0.55);
      border: 1px solid rgba(132, 168, 255, 0.18);
      border-radius: 999px;
      padding: 8px 12px;
      backdrop-filter: blur(6px);
    }
  </style>
</head>
<body>
  <div id="scene">
    <div class="mist"></div>

    <div id="well-wrap">
      <div id="well-glow"></div>
      <div id="well">
        <div id="water"></div>
      </div>
    </div>

    <div id="coins-layer"></div>
    <div id="ripples-layer"></div>
    <div id="particles-layer"></div>
    <div id="affirmation"></div>
    <div id="status">Waiting for blessings…</div>
  </div>

  <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
  <script>
    const affirmations = [
      "your wish has been received…",
      "the universe is aligning for you…",
      "abundance flows toward you…",
      "what is meant for you is moving now…",
      "energy is shifting in your favor…",
      "your blessing is already on its way…",
      "the well has heard your intention…"
    ];

    const PUSHER_KEY = "a3c72b1712fa1d637b30";
    const PUSHER_CLUSTER = "us2";

    const coinsLayer = document.getElementById("coins-layer");
    const ripplesLayer = document.getElementById("ripples-layer");
    const particlesLayer = document.getElementById("particles-layer");
    const affirmation = document.getElementById("affirmation");
    const status = document.getElementById("status");

    function showAffirmation(username = "", customText = "") {
      const line = customText || affirmations[Math.floor(Math.random() * affirmations.length)];
      affirmation.textContent = username ? `✨ ${username}, ${line}` : `✨ ${line}`;
      affirmation.style.opacity = "1";
      setTimeout(() => {
        affirmation.style.opacity = "0";
      }, 4200);
    }

    function addRipple(count = 1) {
      for (let i = 0; i < count; i++) {
        const ripple = document.createElement("div");
        ripple.className = "ripple";
        ripple.style.bottom = (40 + i * 2) + "px";
        ripplesLayer.appendChild(ripple);
        setTimeout(() => ripple.remove(), 2400);
      }
    }

    function addParticles(power = 12) {
      for (let i = 0; i < power; i++) {
        const spark = document.createElement("div");
        spark.className = "spark";
        spark.style.left = `${48 + (Math.random() * 12 - 6)}%`;
        spark.style.bottom = `${140 + Math.random() * 40}px`;
        spark.style.animationDuration = `${2.3 + Math.random() * 2}s`;
        particlesLayer.appendChild(spark);
        setTimeout(() => spark.remove(), 4300);
      }
    }

    function dropCoins(amount = 8) {
      for (let i = 0; i < amount; i++) {
        const coin = document.createElement("div");
        coin.className = "coin";
        coin.style.left = `${46 + (Math.random() * 12 - 6)}%`;
        coin.style.top = `${6 + Math.random() * 18}%`;
        coin.style.animationDuration = `${2.1 + Math.random() * 1.2}s`;
        coinsLayer.appendChild(coin);
        setTimeout(() => coin.remove(), 3200);
      }
    }

    function manifest(amount = 10, username = "", giftName = "", diamonds = 1) {
      const rippleCount = diamonds >= 100 ? 3 : diamonds >= 10 ? 2 : 1;
      const particleCount = Math.min(40, Math.max(10, amount));

      dropCoins(amount);
      addRipple(rippleCount);
      addParticles(particleCount);

      const custom = giftName ? `${giftName} has entered the well…` : "";
      showAffirmation(username, custom);
    }

    const pusher = new Pusher(PUSHER_KEY, {
      cluster: PUSHER_CLUSTER
    });

    const channel = pusher.subscribe("wishing-well");

    channel.bind("gift-received", function(data) {
      console.log("EVENT RECEIVED:", data);

      const amount = Number(data.amount || 10);
      const username = data.username || "";
      const giftName = data.giftName || "";
      const diamonds = Number(data.diamonds || 1);

      manifest(amount, username, giftName, diamonds);

      status.textContent = "Blessing received ✨";
      setTimeout(() => {
        status.textContent = "Waiting for blessings…";
      }, 2500);
    });

    pusher.connection.bind("connected", function() {
      status.textContent = "Connected ✨";
      setTimeout(() => {
        status.textContent = "Waiting for blessings…";
      }, 2000);
    });

    pusher.connection.bind("error", function() {
      status.textContent = "Connection issue";
    });
  </script>
</body>
</html>
